<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Run</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>🦖 Dino Run</h1>
    <p class="hint">Press <kbd>Space</kbd> to jump. Survive 3 minutes to win!</p>

    <div class="game-wrap">
        <canvas id="game" width="800" height="260"></canvas>

        <!-- Game Over overlay -->
        <div id="overlay-gameover" class="overlay hidden">
            <div class="overlay-card">
                <h2>💀 Game Over</h2>
                <p id="gameover-msg">You crashed!</p>
                <button class="replay-btn" data-action="replay">Replay</button>
            </div>
        </div>

        <!-- Win overlay -->
        <div id="overlay-win" class="overlay hidden">
            <div class="overlay-card">
                <h2>🏆 You Win!</h2>
                <p>You survived 3 minutes!</p>
                <button class="replay-btn" data-action="replay">Replay</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='game.js') }}"></script>
</body>
</html>
